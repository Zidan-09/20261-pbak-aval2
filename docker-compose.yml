services:
  postgres:
    image: postgres:16
    container_name: pbak-aval2-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: trip_requests_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: