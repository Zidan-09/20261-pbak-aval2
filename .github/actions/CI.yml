name: "CI pipeline"

on:
  pull_request:
    branches:
      - "develop"
      - "main"
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout of Code
        uses: actions/checkout@v5

      - name: Configure Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test